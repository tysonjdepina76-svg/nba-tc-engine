<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TC Engine — Verified +EV Alerts</title>
  <style>
    body { background:#0d1117; color:#c9d1d9; font-family:system-ui,sans-serif; margin:0; padding:24px; }
    header { border-bottom:1px solid #30363d; margin-bottom:20px; padding-bottom:14px; }
    h1 { color:#58a6ff; margin:0 0 4px; }
    .subtle { color:#8b949e; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:15px; }
    .card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:15px; }
    .sport { background:#238636; border-radius:12px; color:#fff; display:inline-block; font-size:11px; padding:3px 9px; }
    .edge { color:#3fb950; font-size:20px; font-weight:700; margin-top:8px; }
    .truth { color:#8b949e; font-size:12px; margin-top:10px; }
    .empty { color:#8b949e; padding:20px 0; }
  </style>
</head>
<body>
  <header>
    <h1>📊 TC ENGINE</h1>
    <div class="subtle">Verified sportsbook-line alerts only · projection-only rows excluded</div>
  </header>
  <main id="alerts" class="grid" aria-live="polite"><div class="empty">Loading verified alerts…</div></main>
  <script>
    function safe(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    async function fetchAlerts() {
      const root = document.getElementById('alerts');
      try {
        const response = await fetch('/api/alerts', {headers:{'Accept':'application/json'}});
        const payload = await response.json();
        const alerts = Array.isArray(payload) ? payload : (payload.alerts || []);
        root.innerHTML = alerts.length ? alerts.map(a => `
          <article class="card">
            <span class="sport">${safe(a.sport)}</span>
            <h2>${safe(a.player)}</h2>
            <div class="subtle">${safe(a.prop)} · ${safe(a.period)} · ${safe(a.direction)}</div>
            <div class="edge">Edge: ${safe(a.edge)}</div>
            <div class="truth">✓ ${safe(a.truth || 'REAL_LINE')} · ${safe(a.source || 'verified book')}</div>
          </article>`).join('') : '<div class="empty">No verified +EV alerts available.</div>';
      } catch (error) {
        root.innerHTML = '<div class="empty">Alert data unavailable. No unverified picks shown.</div>';
      }
    }
    fetchAlerts();
    setInterval(fetchAlerts, 10000);
  </script>
</body>
</html>
