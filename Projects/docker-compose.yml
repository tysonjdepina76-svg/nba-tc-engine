version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run dashboard/tc_dashboard.py --server.port 8510 --server.address 0.0.0.0
    ports:
      - "8510:8510"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  pipeline:
    build: .
    command: python3 -c "import time; from pipeline.daily_picks import generate_daily_picks; 
      while True: 
        [generate_daily_picks(s) for s in ['wnba','mlb','wc']]
        time.sleep(3600)"
    env_file:
      - .env
    depends_on:
      - api
      - redis
    restart: unless-stopped
