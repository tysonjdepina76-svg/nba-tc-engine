version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tc_engine}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    command: uvicorn engine.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  live_engine:
    build: .
    command: python -u engine/stagger.py
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
      - STAGGER_SECONDS=300
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      - api
    restart: unless-stopped

  telegram:
    build: .
    command: python -u engine/telegram_bot.py
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./logs:/app/logs
    depends_on:
      - api
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run engine/ml_dashboard.py --server.port 8520 --server.address 0.0.0.0
    ports:
      - "8520:8520"
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - MODEL_DIR=/app/models
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
