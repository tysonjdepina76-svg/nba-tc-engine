# prometheus.yml — scrape config for TC Sports App
global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "tc-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: "tc-dashboard"
    static_configs:
      - targets: ["dashboard:8501"]
